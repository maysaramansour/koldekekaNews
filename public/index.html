<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كل دقيقة — أخبار عربية مباشرة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">

      <div class="brand">
        <span class="brand-ar">كل دقيقة</span>
        <span class="brand-en">Arab News Live</span>
      </div>

      <div class="header-center">
        <!-- Urgency filter -->
        <button class="urgent-btn" id="urgentBtn">
          <span class="urgent-pulse"></span>عاجل
        </button>
        <!-- Language toggle -->
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="all">الكل</button>
          <button class="lang-btn" data-lang="ar">عربي</button>
          <button class="lang-btn" data-lang="en">English</button>
        </div>
      </div>

      <div class="status-bar">
        <span class="live-dot" id="liveDot"></span>
        <span class="status-label" id="statusLabel">جارٍ الاتصال…</span>
        <span class="status-sep">·</span>
        <span id="articleCount" class="count-badge">—</span>
        <span class="status-sep">·</span>
        <span id="nextUpdate" class="next-update">—</span>

        <!-- Notification bell -->
        <button class="notif-bell" id="notifBell" aria-label="الإشعارات">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </button>
      </div>

      <!-- Notification panel -->
      <div class="notif-panel" id="notifPanel" style="display:none">
        <div class="notif-panel-header">
          <span>الإشعارات</span>
          <button class="notif-clear" id="notifClear">مسح الكل</button>
        </div>
        <div class="notif-list" id="notifList">
          <div class="notif-empty">لا توجد إشعارات بعد</div>
        </div>
      </div>

    </div>
  </header>

  <!-- ── Source Filters ─────────────────────────────────────────────── -->
  <nav class="filters" id="filterBar">
    <button class="filter-btn active" data-source="all">كل المصادر</button>
  </nav>

  <!-- ── Toast ──────────────────────────────────────────────────────── -->
  <!-- ── Article Modal ─────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>

      <!-- Loading state -->
      <div class="modal-loading" id="modalLoading">
        <div class="modal-sk modal-sk-img"></div>
        <div class="modal-sk-body">
          <div class="modal-sk modal-sk-line" style="width:60%;height:12px"></div>
          <div class="modal-sk modal-sk-line" style="width:90%;height:22px;margin-top:12px"></div>
          <div class="modal-sk modal-sk-line" style="width:80%;height:22px;margin-top:6px"></div>
          <div class="modal-sk modal-sk-line" style="width:100%;height:14px;margin-top:20px"></div>
          <div class="modal-sk modal-sk-line" style="width:95%;height:14px;margin-top:6px"></div>
          <div class="modal-sk modal-sk-line" style="width:88%;height:14px;margin-top:6px"></div>
        </div>
      </div>

      <!-- Content -->
      <div class="modal-content" id="modalContent" style="display:none">
        <div class="modal-hero" id="modalHero"></div>
        <div class="modal-body" id="modalBody">
          <div class="modal-meta" id="modalMeta"></div>
          <h1 class="modal-title" id="modalTitle"></h1>
          <p class="modal-desc" id="modalDesc"></p>
          <div class="modal-article-body" id="modalArticleBody"></div>
          <a class="modal-read-btn" id="modalReadBtn" target="_blank" rel="noopener noreferrer">
            <span id="modalReadBtnText">Read full article</span>
            <span>↗</span>
          </a>
        </div>
      </div>

      <!-- Error state -->
      <div class="modal-error" id="modalError" style="display:none">
        <p class="modal-error-msg" id="modalErrorMsg"></p>
        <a class="modal-read-btn" id="modalErrorBtn" target="_blank" rel="noopener noreferrer">
          Open article ↗
        </a>
      </div>
    </div>
  </div></div>

  <!-- ── Grid ──────────────────────────────────────────────────────── -->
  <main class="grid-container">
    <div class="grid" id="newsGrid">
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
    </div>
  </main>

  <!-- ── Footer ────────────────────────────────────────────────────── -->
  <footer class="footer">
    <span class="footer-ar">كل دقيقة</span> · تجميع الأخبار العربية كل دقيقة · بدون تكرار
    <span class="footer-sep">·</span>
    <span class="footer-en">Arab news aggregated every minute</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
